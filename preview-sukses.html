<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview Animasi Sukses</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #f7f9fc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    
    .card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      text-align: center;
      max-width: 300px;
      width: 100%;
    }

    .success-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
    }

    .success-icon svg {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      display: block;
      stroke-width: 3;
      stroke: #10B981; /* Warna hijau cantik */
      stroke-miterlimit: 10;
      box-shadow: inset 0px 0px 0px #10B981;
      animation: fill .4s ease-in-out .4s forwards, scale .3s ease-in-out .9s both;
    }

    .success-icon svg circle {
      stroke-dasharray: 166;
      stroke-dashoffset: 166;
      stroke-width: 3;
      stroke-miterlimit: 10;
      stroke: #10B981;
      fill: none;
      animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
    }

    .success-icon svg path {
      transform-origin: 50% 50%;
      stroke-dasharray: 48;
      stroke-dashoffset: 48;
      animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.6s forwards;
    }

    .title {
      color: #111827;
      font-size: 20px;
      font-weight: 600;
      margin: 0 0 8px;
      opacity: 0;
      transform: translateY(15px);
      animation: fadeUp 0.5s ease 0.9s forwards;
    }

    .subtitle {
      color: #6B7280;
      font-size: 14px;
      margin: 0;
      opacity: 0;
      transform: translateY(15px);
      animation: fadeUp 0.5s ease 1s forwards;
    }

    .replay-btn {
      margin-top: 30px;
      padding: 10px 20px;
      background: #f3f4f6;
      border: none;
      border-radius: 8px;
      color: #374151;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .replay-btn:hover {
      background: #e5e7eb;
    }

    @keyframes stroke {
      100% {
        stroke-dashoffset: 0;
      }
    }

    @keyframes scale {
      0%, 100% {
        transform: none;
      }
      50% {
        transform: scale3d(1.1, 1.1, 1);
      }
    }

    @keyframes fill {
      100% {
        box-shadow: inset 0px 0px 0px 40px rgba(16, 185, 129, 0.1); /* Efek hijau transparan mengisi */
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="card" id="animation-container">
    <div class="success-icon">
      <svg viewBox="0 0 52 52">
        <circle cx="26" cy="26" r="25" fill="none"/>
        <path fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
      </svg>
    </div>
    <h2 class="title">Berhasil Disimpan!</h2>
    <p class="subtitle">Data pengeluaran telah terekap otomatis di Spreadsheet Anda.</p>
  </div>

  <button class="replay-btn" onclick="replayAnimation()">Ulangi Animasi</button>

  <script>
    function replayAnimation() {
      const container = document.getElementById('animation-container');
      const clone = container.cloneNode(true);
      container.parentNode.replaceChild(clone, container);
    }
  </script>

</body>
</html>
